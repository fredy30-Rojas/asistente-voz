<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AI Coder">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="ai-coder-manifest.json">
<title>AI Coder</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif;
    font-size: 18px; height: 100vh; height: 100dvh; display: flex; flex-direction: column;
    -webkit-tap-highlight-color: transparent;
  }
  #chat {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
    -webkit-overflow-scrolling: touch;
  }
  .msg {
    max-width: 88%; padding: 12px 16px; border-radius: 14px;
    line-height: 1.5; word-wrap: break-word; position: relative;
  }
  .msg.user {
    align-self: flex-end; background: #0f3460; color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start; background: #16213e; color: #e0e0e0;
    border-bottom-left-radius: 4px; white-space: pre-wrap;
  }
  .msg .speak-btn {
    background: none; border: none; color: #f0c040; cursor: pointer;
    font-size: 22px; float: right; margin-left: 8px; padding: 4px 8px;
    min-width: 44px; min-height: 44px;
  }
  .msg .speak-btn:hover { color: #ffd700; }
  #input-area {
    padding: 12px 16px; background: #111; display: flex;
    flex-direction: column; gap: 8px;
  }
  textarea {
    width: 100%; height: 100px; background: #222; color: #fff;
    border: 2px solid #333; border-radius: 10px; padding: 12px;
    font-size: 18px; font-family: 'Segoe UI', sans-serif;
    resize: none; -webkit-appearance: none;
  }
  textarea:focus { outline: none; border-color: #f0c040; }
  #button-row { display: flex; gap: 8px; align-items: center; }
  button {
    padding: 14px 24px; font-size: 18px; border: none; border-radius: 10px;
    cursor: pointer; font-weight: bold; min-height: 48px;
    -webkit-tap-highlight-color: transparent;
  }
  #send-btn { background: #f0c040; color: #1a1a2e; flex: 1; }
  #send-btn:active { background: #ffd700; }
  #clear-btn { background: #333; color: #ccc; }
  #clear-btn:active { background: #555; }
  #status { font-size: 13px; color: #888; }
  .config-overlay {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.95); display: flex; align-items: center;
    justify-content: center; z-index: 100;
  }
  .config-box {
    background: #1a1a2e; padding: 24px; border-radius: 16px;
    max-width: 460px; width: 92%; border: 2px solid #f0c040;
  }
  .config-box h2 { margin-bottom: 12px; color: #f0c040; font-size: 20px; }
  .config-box input {
    width: 100%; padding: 14px; font-size: 18px; background: #222;
    color: #fff; border: 2px solid #333; border-radius: 10px; margin-bottom: 12px;
    -webkit-appearance: none;
  }
  .config-box button { width: 100%; background: #f0c040; color: #1a1a2e; }
  .config-box .note { font-size: 13px; color: #888; margin-top: 10px; text-align: center; }
  code { background: #2a2a3e; padding: 2px 6px; border-radius: 4px; }
  pre { background: #111; padding: 12px; border-radius: 8px; overflow-x: auto; font-size: 14px; }
  .typing { color: #f0c040; font-style: italic; }
  .auto-speak-badge {
    position: fixed; bottom: 16px; right: 16px; background: #333;
    color: #f0c040; padding: 8px 14px; border-radius: 20px;
    font-size: 14px; cursor: pointer; z-index: 50;
  }
  #voice-bar {
    display: flex; align-items: center; gap: 8px;
  }
  #mic-btn {
    min-width: 56px; min-height: 56px; width: 56px; height: 56px;
    border-radius: 50%; background: #2a2a4e; color: #ccc;
    font-size: 28px; display: flex; align-items: center; justify-content: center;
    border: 2px solid #444; cursor: pointer; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent; padding: 0;
  }
  #mic-btn:active { background: #3a3a5e; }
  #mic-btn.push-talk {
    background: #ff3333; color: #fff; border-color: #ff3333;
    animation: pulse-red 1.5s infinite;
  }
  #mic-btn.alexa-mode {
    background: #0066ff; color: #fff; border-color: #0066ff;
    animation: pulse-blue 2s infinite;
  }
  @keyframes pulse-red {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,51,51,0.5); }
    50% { box-shadow: 0 0 0 12px rgba(255,51,51,0); }
  }
  @keyframes pulse-blue {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0,102,255,0.4); }
    50% { box-shadow: 0 0 0 14px rgba(0,102,255,0); }
  }
  #voice-status {
    flex: 1; font-size: 14px; color: #888;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #voice-status.active { color: #ff6666; }
  #voice-status.alexa { color: #66aaff; }
</style>
</head>
<body>

<div id="chat" aria-live="polite" aria-label="Conversación"></div>

<div id="input-area">
  <textarea id="user-input" placeholder="Escribe o habla tu pregunta..." aria-label="Escribe o habla tu pregunta"></textarea>
  <div id="voice-bar">
    <button id="mic-btn" onclick="toggleMic()" title="Ciclar: Apagado → Pulsar para hablar → Alexa (siempre activo)" aria-label="Presiona para hablar">🎤</button>
    <span id="voice-status">Toca el 🎤: 1=Pulsar 2=Alexa</span>
  </div>
  <div id="button-row">
    <button id="send-btn" onclick="send()">Enviar</button>
    <button id="clear-btn" onclick="clearChat()">🗑️</button>
    <span id="status"></span>
  </div>
</div>

<div class="config-overlay" id="config-overlay">
  <div class="config-box">
    <h2>Configurar AI Coder</h2>
    <label for="api-key">API Key (Cerebras o Groq)</label>
    <input type="password" id="api-key" placeholder="csk_... o gsk_..." aria-label="API Key">
    <button onclick="saveConfig()">Guardar</button>
    <p class="note">Tu key se guarda solo aquí. Gratis, sin tarjeta.<br>Consíguela en cloud.cerebras.ai</p>
  </div>
</div>

<div class="auto-speak-badge" id="auto-speak-badge" onclick="toggleAutoSpeak()" title="Activar/desactivar voz automática">🔊 Auto</div>

<script>
const CEREBRAS_URL = 'https://api.cerebras.ai/v1/chat/completions';
const GROQ_URL = 'https://api.groq.com/openai/v1/chat/completions';

let apiKey = localStorage.getItem('groq_api_key') || '';
let messages = [];
let chatEl = document.getElementById('chat');
let inputEl = document.getElementById('user-input');
let statusEl = document.getElementById('status');
let configOverlay = document.getElementById('config-overlay');
let autoSpeakBadge = document.getElementById('auto-speak-badge');
let speaking = false;
let autoSpeak = true;
let recognition = null;
let isListening = false;
let alexaMode = false;
let micPaused = false;
let wakeDetected = false;
let followUpMode = false;
let wakeResultCount = 0;
let wakeAfterText = '';
let silenceTimer = null;
let followUpTimer = null;
let lastSpeechTime = 0;
const SILENCE_TIMEOUT = 2500; // 2.5s silencio → enviar
const FOLLOW_UP_TIMEOUT = 8000; // 8s para seguir conversando sin wake word
const WAKE_WORD = 'asistente';

// Sonido de inicio (como Alexa al encender) - tono ascendente
function playStartChime() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var now = ctx.currentTime;
    [600, 900].forEach(function(freq, i) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq; osc.type = 'sine';
      gain.gain.setValueAtTime(0, now + i * 0.12);
      gain.gain.linearRampToValueAtTime(0.25, now + i * 0.12 + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.2);
      osc.start(now + i * 0.12);
      osc.stop(now + i * 0.12 + 0.25);
    });
  } catch(e) {}
}

// Beep cuando detecta la palabra clave
function playBeep() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 800; osc.type = 'sine';
    gain.gain.value = 0.3;
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.stop(ctx.currentTime + 0.15);
  } catch(e) {}
}

// Sonido sutil al terminar de responder (como Alexa)
function playEndChime() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var now = ctx.currentTime;
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(700, now);
    osc.frequency.linearRampToValueAtTime(400, now + 0.2);
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
    osc.start(now); osc.stop(now + 0.3);
  } catch(e) {}
}

// Voice recognition init
function initVoice() {
  let SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById('mic-btn').style.display = 'none';
    document.getElementById('voice-status').textContent = 'Voz no disponible en este navegador';
    return;
  }
  recognition = new SpeechRecognition();
  recognition.lang = 'es-ES';
  recognition.interimResults = true;
  recognition.continuous = true;
  recognition.maxAlternatives = 1;

  recognition.onresult = function(e) {
    let transcript = '';
    for (let i = 0; i < e.results.length; i++) {
      transcript += e.results[i][0].transcript;
    }
    inputEl.value = transcript;
    let vs = document.getElementById('voice-status');

    if (alexaMode) {
      if (!wakeDetected && !followUpMode) {
        // Buscar palabra clave en el texto
        var lower = transcript.toLowerCase();
        var idx = lower.indexOf(WAKE_WORD);
        if (idx !== -1) {
          wakeDetected = true;
          wakeResultCount = e.results.length;
          wakeAfterText = transcript.substring(idx + WAKE_WORD.length).trim();
          playBeep();
          inputEl.value = wakeAfterText;
          vs.textContent = wakeAfterText || 'Te escucho...';
          vs.className = 'alexa';
          lastSpeechTime = Date.now();
          if (wakeAfterText) resetSilenceTimer();
        } else {
          vs.textContent = 'Di "' + WAKE_WORD + '"...';
          vs.className = 'alexa';
        }
        return;
      }
      // Wake word detectado o en follow-up: mostrar solo texto nuevo
      var newText = wakeAfterText;
      for (var i = wakeResultCount; i < e.results.length; i++) {
        newText += e.results[i][0].transcript;
      }
      inputEl.value = newText;
      vs.textContent = newText || 'Te escucho...';
      vs.className = 'alexa';
      if (newText.trim()) {
        // En follow-up: reiniciar timer de 8s
        if (followUpMode && followUpTimer) {
          clearTimeout(followUpTimer);
          followUpTimer = setTimeout(function() {
            if (followUpMode && alexaMode) {
              pauseAlexaMic();
              setTimeout(function() { resumeAlexaMic(); }, 200);
            }
          }, FOLLOW_UP_TIMEOUT);
        }
        lastSpeechTime = Date.now();
        resetSilenceTimer();
      }
      return;
    }

    // Push-to-talk mode
    vs.textContent = transcript || 'Escuchando...';
    vs.className = 'active';
  };

  recognition.onerror = function(e) {
    let vs = document.getElementById('voice-status');
    if (e.error === 'no-speech') {
      if (alexaMode) {
        // En modo Alexa, ignorar no-speech y reintentar
        try { setTimeout(function() { if (alexaMode) recognition.start(); }, 500); } catch(ex) {}
        return;
      }
      vs.textContent = 'No te escuché. Intenta de nuevo.';
    } else if (e.error === 'audio-capture') {
      vs.textContent = 'Sin micrófono. Revisa permisos.';
      if (alexaMode) stopAlexaMode();
    } else if (e.error === 'not-allowed') {
      vs.textContent = 'Permiso de micrófono denegado.';
      if (alexaMode) stopAlexaMode();
    } else if (e.error === 'aborted') {
      return;
    } else {
      vs.textContent = 'Error: ' + e.error;
    }
    if (!alexaMode) {
      stopListening();
      vs.className = '';
      setTimeout(function() {
        vs.textContent = 'Toca el 🎤: 1=Pulsar 2=Alexa';
      }, 3000);
    }
  };

  recognition.onend = function() {
    if (micPaused) return; // No reiniciar si está pausado (TTS en progreso)
    if (alexaMode && !speaking) {
      try { recognition.start(); } catch(e) {}
    } else if (isListening && !alexaMode) {
      try { recognition.start(); } catch(e) {}
    }
  };
}

// Silence timer for Alexa mode
function resetSilenceTimer() {
  if (silenceTimer) clearTimeout(silenceTimer);
  silenceTimer = setTimeout(function() {
    if (!alexaMode) return;
    let text = inputEl.value.trim();
    if (text && Date.now() - lastSpeechTime >= SILENCE_TIMEOUT) {
      // Pausar mic mientras se envía y TTS responde
      pauseAlexaMic();
      document.getElementById('voice-status').textContent = 'Enviando...';
      send().then(function() {
        // Esperar a que termine el TTS y reactivar
        waitForTtsThenResume();
      });
    }
  }, SILENCE_TIMEOUT);
}

function waitForTtsThenResume() {
  if (!speaking) { startFollowUpMode(); return; }
  var check = setInterval(function() {
    if (!speaking) {
      clearInterval(check);
      startFollowUpMode();
    }
  }, 300);
  setTimeout(function() { clearInterval(check); if (micPaused) startFollowUpMode(); }, 30000);
}

function pauseAlexaMic() {
  if (silenceTimer) clearTimeout(silenceTimer);
  micPaused = true;
  try { recognition.stop(); } catch(e) {}
}

function resumeAlexaMic() {
  micPaused = false;
  wakeDetected = false;
  followUpMode = false;
  wakeAfterText = '';
  if (silenceTimer) clearTimeout(silenceTimer);
  if (followUpTimer) clearTimeout(followUpTimer);
  if (alexaMode) {
    document.getElementById('voice-status').textContent = 'Di "' + WAKE_WORD + '"...';
    document.getElementById('voice-status').className = 'alexa';
    try { recognition.start(); } catch(e) {}
  }
}

// Modo conversacion: seguir escuchando 8s sin wake word (como Alexa)
function startFollowUpMode() {
  micPaused = false;
  wakeDetected = true; // No necesita wake word en follow-up
  followUpMode = true;
  wakeAfterText = '';
  wakeResultCount = 0;
  if (silenceTimer) clearTimeout(silenceTimer);
  if (followUpTimer) clearTimeout(followUpTimer);
  playEndChime();
  if (alexaMode) {
    document.getElementById('voice-status').textContent = 'Te escucho...';
    document.getElementById('voice-status').className = 'alexa';
    // Si el usuario no habla en 8s, volver a esperar wake word
    followUpTimer = setTimeout(function() {
      if (followUpMode && alexaMode) {
        pauseAlexaMic();
        setTimeout(function() { resumeAlexaMic(); }, 200);
      }
    }, FOLLOW_UP_TIMEOUT);
    try { recognition.start(); } catch(e) {}
  }
}

function toggleMic() {
  if (!recognition) { initVoice(); if (!recognition) return; }

  if (alexaMode) {
    // Alexa → Apagado
    stopAlexaMode();
  } else if (isListening) {
    // Push-to-talk → Alexa mode
    stopListeningNoSend();
    startAlexaMode();
  } else {
    // Apagado → Push-to-talk
    startListening();
  }
}

function startAlexaMode() {
  alexaMode = true;
  isListening = false;
  wakeDetected = false;
  followUpMode = false;
  if (followUpTimer) clearTimeout(followUpTimer);
  var micBtn = document.getElementById('mic-btn');
  micBtn.classList.add('alexa-mode');
  micBtn.innerHTML = '🔵';
  micBtn.title = 'Modo Alexa activo. Di "' + WAKE_WORD + '" para activar.';
  document.getElementById('voice-status').textContent = 'Di "' + WAKE_WORD + '"...';
  document.getElementById('voice-status').className = 'alexa';
  inputEl.placeholder = 'Di "' + WAKE_WORD + '"...';
  try { recognition.start(); } catch(e) {}
  setTimeout(function() { playStartChime(); }, 400);
}

function stopAlexaMode() {
  alexaMode = false;
  wakeDetected = false;
  followUpMode = false;
  if (silenceTimer) clearTimeout(silenceTimer);
  if (followUpTimer) clearTimeout(followUpTimer);
  let micBtn = document.getElementById('mic-btn');
  micBtn.classList.remove('alexa-mode');
  micBtn.innerHTML = '🎤';
  micBtn.title = 'Ciclar: Apagado → Pulsar para hablar → Alexa (siempre activo)';
  document.getElementById('voice-status').textContent = 'Toca el 🎤: 1=Pulsar 2=Alexa';
  document.getElementById('voice-status').className = '';
  inputEl.placeholder = 'Escribe o habla tu pregunta...';
  try { recognition.stop(); } catch(e) {}
}

function startListening() {
  if (isListening || alexaMode) return;
  isListening = true;
  let micBtn = document.getElementById('mic-btn');
  micBtn.classList.add('push-talk');
  micBtn.innerHTML = '🔴';
  micBtn.title = 'Pulsar para hablar activo. Toca para cambiar a Alexa.';
  document.getElementById('voice-status').textContent = 'Escuchando...';
  document.getElementById('voice-status').className = 'active';
  inputEl.placeholder = 'Habla ahora...';
  try { recognition.start(); } catch(e) {}
}

function stopListening() {
  if (!isListening) return;
  isListening = false;
  let micBtn = document.getElementById('mic-btn');
  micBtn.classList.remove('push-talk');
  micBtn.innerHTML = '🎤';
  document.getElementById('voice-status').className = '';
  inputEl.placeholder = 'Escribe o habla tu pregunta...';
  try { recognition.stop(); } catch(e) {}

  let text = inputEl.value.trim();
  if (text) {
    document.getElementById('voice-status').textContent = 'Enviando...';
    send();
  } else {
    document.getElementById('voice-status').textContent = 'Toca el 🎤: 1=Pulsar 2=Alexa';
  }
}

function stopListeningNoSend() {
  if (!isListening) return;
  isListening = false;
  let micBtn = document.getElementById('mic-btn');
  micBtn.classList.remove('push-talk');
  try { recognition.stop(); } catch(e) {}
}

// Pausar Alexa mientras el asistente habla (TTS)
let origSpeak = speak;
speak = function(text) {
  if (alexaMode) pauseAlexaMic();
  origSpeak(text);
};

// Init
initVoice();
document.getElementById('api-key').value = localStorage.getItem('groq_api_key') || '';
if (localStorage.getItem('groq_api_key')) {
  configOverlay.style.display = 'none';
  loadHistory();
  // Activar modo Alexa automaticamente al abrir
  setTimeout(function() { startAlexaMode(); }, 800);
} else {
  configOverlay.style.display = 'flex';
}

document.getElementById('api-key').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') saveConfig();
});

inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

function toggleAutoSpeak() {
  autoSpeak = !autoSpeak;
  autoSpeakBadge.textContent = autoSpeak ? '🔊 Auto' : '🔇 Manual';
  autoSpeakBadge.style.color = autoSpeak ? '#f0c040' : '#888';
}

function saveConfig() {
  apiKey = document.getElementById('api-key').value.trim();
  if (!apiKey) { alert('Pega tu API key'); return; }
  localStorage.setItem('groq_api_key', apiKey);
  configOverlay.style.display = 'none';
  addMessage('assistant', 'AI Coder listo. Di "asistente" y hare lo que necesites.');
  // Activar modo Alexa automaticamente
  setTimeout(function() { startAlexaMode(); }, 500);
}

function loadHistory() {
  try {
    let saved = localStorage.getItem('groq_chat_history');
    if (saved) {
      messages = JSON.parse(saved);
      chatEl.innerHTML = '';
      messages.forEach(function(m) { renderMessage(m); });
      chatEl.scrollTop = chatEl.scrollHeight;
    } else {
      addMessage('assistant', 'AI Coder listo. Di "asistente" y hare lo que necesites.');
    }
  } catch(e) {
    messages = [];
    localStorage.removeItem('groq_chat_history');
    addMessage('assistant', 'AI Coder listo. Di "asistente" y hare lo que necesites.');
  }
}

function saveHistory() {
  localStorage.setItem('groq_chat_history', JSON.stringify(messages));
}

function addMessage(role, content) {
  let msg = { role: role, content: content };
  messages.push(msg);
  renderMessage(msg);
  saveHistory();
  chatEl.scrollTop = chatEl.scrollHeight;
}

function renderMessage(msg) {
  let div = document.createElement('div');
  div.className = 'msg ' + msg.role;
  let text = document.createElement('span');
  text.textContent = msg.content;
  let speakBtn = document.createElement('button');
  speakBtn.className = 'speak-btn';
  speakBtn.innerHTML = '🔊';
  speakBtn.title = 'Leer en voz alta';
  speakBtn.setAttribute('aria-label', 'Leer en voz alta');
  speakBtn.onclick = function() { speak(msg.content); };
  div.appendChild(speakBtn);
  div.appendChild(text);
  chatEl.appendChild(div);
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  if (speaking) { speaking = false; return; }
  speaking = true; // Marcar antes por si hay que cargar voces

  let cleanText = text
    .replace(/```[\s\S]*?```/g, ' (código omitido) ')
    .replace(/`([^`]+)`/g, '$1')
    .replace(/\*\*([^*]+)\*\*/g, '$1')
    .replace(/\*([^*]+)\*/g, '$1')
    .replace(/#{1,6}\s/g, '')
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
    .replace(/_{1,3}/g, '')
    .replace(/~~/g, '');

  let voices = window.speechSynthesis.getVoices();
  if (voices.length === 0) {
    window.speechSynthesis.onvoiceschanged = function() {
      window.speechSynthesis.onvoiceschanged = null;
      speakNow(cleanText);
    };
    return;
  }
  speakNow(cleanText);
}

function speakNow(text) {
  let utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'es-ES';
  utterance.rate = 1.0;
  let voices = window.speechSynthesis.getVoices();
  let spanishVoice = voices.find(function(v) { return v.lang === 'es-ES' || v.lang === 'es-MX'; });
  if (!spanishVoice) spanishVoice = voices.find(function(v) { return v.lang.startsWith('es'); });
  if (spanishVoice) utterance.voice = spanishVoice;
  utterance.onend = function() { speaking = false; };
  utterance.onerror = function() { speaking = false; };
  window.speechSynthesis.speak(utterance);
}

function getApiConfig() {
  if (apiKey.startsWith('gsk_')) {
    return { url: GROQ_URL, model: 'llama-3.3-70b-versatile' };
  }    return { url: CEREBRAS_URL, model: 'zai-glm-4.7' };
}

async function send() {
  let userText = inputEl.value.trim();
  if (!userText) return;
  if (!apiKey) { configOverlay.style.display = 'flex'; return; }

  addMessage('user', userText);
  inputEl.value = '';
  statusEl.textContent = 'Pensando...';

  let apiConfig = getApiConfig();
  let apiMessages = [{
    role: 'system',
    content: 'Eres un asistente de voz. Responde en español, de forma clara, concisa y hablada. Máximo 3 oraciones. Lenguaje natural, cálido. Sin markdown ni código largo.'
  }];

  let recentMessages = messages.slice(-20);
  apiMessages = apiMessages.concat(recentMessages.map(function(m) {
    return { role: m.role, content: m.content };
  }));

  try {
    let xhr = new XMLHttpRequest();
    xhr.open('POST', apiConfig.url, true);
    xhr.setRequestHeader('Authorization', 'Bearer ' + apiKey);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.setRequestHeader('User-Agent', 'ai-coder/1.0');

    let response = await new Promise(function(resolve, reject) {
      xhr.onload = function() { resolve(xhr); };
      xhr.onerror = function() { reject(new Error('Error de red')); };
      xhr.ontimeout = function() { reject(new Error('Timeout')); };
      xhr.timeout = 30000;
      xhr.send(JSON.stringify({
        model: apiConfig.model,
        messages: apiMessages,
        temperature: 0.7,
        max_tokens: 512
      }));
    });

    let data = JSON.parse(response.responseText);

    if (data.error) {
      addMessage('assistant', 'Error: ' + data.error.message);
      statusEl.textContent = 'Error';
    } else if (data.choices && data.choices[0]) {
      let reply = data.choices[0].message.content;
      addMessage('assistant', reply);
      statusEl.textContent = 'Listo';
      if (autoSpeak) speak(reply);
    } else {
      addMessage('assistant', 'No obtuve respuesta. ¿Key correcta?');
      statusEl.textContent = 'Sin respuesta';
    }
  } catch(e) {
    addMessage('assistant', 'Error de conexión. ¿Tienes internet?');
    statusEl.textContent = 'Error';
  }
}

function clearChat() {
  messages = [];
  localStorage.removeItem('groq_chat_history');
  chatEl.innerHTML = '';
  addMessage('assistant', 'Chat limpio. ¿En qué te ayudo?');
}

// Register Service Worker for PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('ai-coder-sw.js').catch(function() {});
  });
}
</script>
