name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ai-coder-native/package-lock.json

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36'

      - name: Install npm dependencies
        working-directory: ai-coder-native
        run: npm ci

      - name: Patch Capacitor AGP version (8.13.0 no existe)
        working-directory: ai-coder-native
        run: |
          sed -i "s/com.android.tools.build:gradle:8.13.0/com.android.tools.build:gradle:8.9.2/g" node_modules/@capacitor/android/capacitor/build.gradle
          echo "Capacitor AGP parcheado"

      - name: Prepare web assets
        working-directory: ai-coder-native
        run: |
          mkdir -p www
          cp ../web/ai-coder.html www/index.html
          cp ../web/ai-coder-manifest.json www/
          cp ../web/ai-coder-sw.js www/
          # Copiar assets a Android
          mkdir -p android/app/src/main/assets/public
          cp -r www/* android/app/src/main/assets/public/
          cp capacitor.config.json android/app/src/main/assets/

      - name: Build debug APK
        working-directory: ai-coder-native/android
        run: |
          echo "sdk.dir=${ANDROID_HOME:-/usr/local/lib/android/sdk}" > local.properties
          chmod +x gradlew
          set -o pipefail
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-coder-debug-apk
          path: |
            ai-coder-native/android/app/build/outputs/apk/debug/*.apk
            ai-coder-native/android/app/build/outputs/apk/**/*.apk
          retention-days: 30
          if-no-files-found: warn
