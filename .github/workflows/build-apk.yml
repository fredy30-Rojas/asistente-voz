name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-coder-native

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ai-coder-native/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0 platforms;android-34 build-tools;34.0.0'

      - name: Install npm dependencies
        run: npm ci

      - name: Copy web files to www/
        run: |
          cp ../web/ai-coder.html www/index.html
          cp ../web/ai-coder-manifest.json www/
          cp ../web/ai-coder-sw.js www/

      - name: Sync Capacitor (copy web assets to Android)
        run: npx cap sync

      - name: Create local.properties
        working-directory: ai-coder-native/android
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build debug APK
        working-directory: ai-coder-native/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-coder-debug-apk
          path: ai-coder-native/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
