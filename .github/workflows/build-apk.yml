name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-36" "build-tools;36.0.0" 2>/dev/null || \
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-36" "build-tools;36.0.0" 2>/dev/null || \
          echo "SDK 36 install attempted via sdkmanager (may already be present)"

      - name: Install npm dependencies
        working-directory: ai-coder-native
        run: npm ci

      - name: Copy web files to www/
        working-directory: ai-coder-native
        run: |
          cp ../web/ai-coder.html www/index.html
          cp ../web/ai-coder-manifest.json www/
          cp ../web/ai-coder-sw.js www/

      - name: Sync Capacitor
        working-directory: ai-coder-native
        run: npx cap sync

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > ai-coder-native/android/local.properties

      - name: Build debug APK
        working-directory: ai-coder-native/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-coder-debug-apk
          path: ai-coder-native/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
